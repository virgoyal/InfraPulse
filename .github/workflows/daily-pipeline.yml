name: Daily pipeline

on:
  schedule:
    - cron: "30 1 * * *"   # 1:30 AM UTC = ~7 AM IST
  workflow_dispatch:        # allow manual trigger from GitHub Actions tab

jobs:
  update-tenders:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: pipeline/requirements.txt

      - name: Install dependencies
        run: pip install -r pipeline/requirements.txt

      - name: Run pipeline
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          cd pipeline
          python 01_scrape.py
          python 01b_scrape_details.py
          python 02_enrich.py
          python 03_geocode.py
          python 04_insights.py
          python 05_finalize.py

      - name: Commit updated data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add \
            pipeline/data/raw_tenders.json \
            pipeline/data/enriched_tenders.json \
            pipeline/data/geolocated_tenders.json \
            pipeline/data/insights.json \
            frontend/public/data/tenders.json \
            frontend/public/data/insights.json
          # Only commit if there are actual changes
          git diff --cached --quiet || git commit -m "chore: daily tender update $(date -u '+%Y-%m-%d')"

      - name: Push
        run: git push
